<!doctype html>
<html lang="da">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Consent Mode v2 defaults — MUST run before any ad/analytics scripts -->
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag('consent', 'default', {
				ad_storage: 'denied',
				analytics_storage: 'denied',
				functionality_storage: 'granted',
				security_storage: 'granted',
				personalization_storage: 'denied',
				ad_user_data: 'denied',
				ad_personalization: 'denied'
			});
		</script>
		<!-- Plausible (cookieless analytics — safe to load without consent) -->
		<script
			defer
			data-domain="skabelontilfaktura.dk"
			src="https://plausible.skabelontilfaktura.dk/js/script.js"
		></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
